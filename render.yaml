services:
  - type: web
    name: quant-trading-framework
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: python run.py
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: CACHE_DB_PATH
        value: /tmp/cache.db
      - key: CACHE_TTL_HOURS
        value: "24"
      - key: LOG_LEVEL
        value: INFO
      - key: ALPHA_VANTAGE_API_KEY
        sync: false   # set manually in Render dashboard — never committed
